<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#667eea"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="30" fill="#ffffff"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="160" rx="45" ry="50" fill="#ffffff"/>
  
  <!-- Tennis racket -->
  <g transform="translate(130, 120)">
    <!-- Racket head -->
    <ellipse cx="0" cy="0" rx="15" ry="20" fill="none" stroke="#ffffff" stroke-width="3"/>
    <!-- Strings -->
    <line x1="-10" y1="-15" x2="-10" y2="15" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#ffffff" stroke-width="1"/>
    <line x1="10" y1="-15" x2="10" y2="15" stroke="#ffffff" stroke-width="1"/>
    <!-- Handle -->
    <rect x="-2" y="20" width="4" height="25" fill="#ffffff" rx="2"/>
  </g>
</svg>
